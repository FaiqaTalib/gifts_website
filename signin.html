<!-- Jquery -->
 <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

 <link rel="shortcut icon" href="css/logo.png" type="image/png">

  <div class="preloader-logo">VelvetWrap</div>
  <div class="preloader-bar"><div class="preloader-fill"></div></div>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-velvet">
  <div class="container">
    <a class="navbar-brand navbar-brand-text" href="index.html">Velvet<span>Wrap</span></a>
    <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
  <div class="toggler-lines">
    <span></span>

  </div>
</button>
    <div class="collapse navbar-collapse" id="navMenu">

<section class="auth-section">
  <div class="container">
    <div class="auth-card fade-up">
      <div class="auth-logo">VelvetWrap</div>
      <p class="auth-tagline">Sign in to access your gift dashboard</p>

      <button class="social-auth-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.3 30.2 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.8 6C12.4 13 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.4c-.5 2.8-2.1 5.1-4.4 6.7l7 5.4C43.2 37 46.1 31.2 46.1 24.5z"/><path fill="#FBBC05" d="M10.5 28.7c-.5-1.5-.8-3-.8-4.7s.3-3.2.8-4.7l-7.8-6C1 16.4 0 20.1 0 24s1 7.6 2.7 10.7l7.8-6z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7-5.4c-2 1.4-4.6 2.2-8.2 2.2-6.2 0-11.6-4.2-13.5-9.8l-7.8 6C6.6 42.6 14.6 48 24 48z"/></svg>
        Continue with Google
      </button>
      <button class="social-auth-btn">
        <i class="fab fa-facebook-f" style="color:#1877f2;"></i>
        Continue with Facebook
      </button>

      <div class="divider-or">or sign in with email</div>

      <form id="signinForm">
        <div class="mb-3">
          <label class="form-label-velvet">Email Address</label>
          <input type="email" class="form-control-velvet" placeholder="you@email.com" required />
        </div>
        <div class="mb-3">
          <label class="form-label-velvet">Password</label>
          <div style="position:relative;">
            <input type="password" class="form-control-velvet" id="signinPassword" placeholder="••••••••" required style="padding-right:48px;" />
            <button type="button" onclick="togglePassword('signinPassword', this)" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--gray); cursor:pointer; font-size:0.9rem;"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <label style="color:var(--gray); font-size:0.82rem; cursor:pointer; display:flex; gap:8px; align-items:center;">
            <input type="checkbox" style="accent-color:var(--gold);"> Remember me
          </label>
          <a href="#" style="color:var(--gold); font-size:0.82rem;">Forgot Password?</a>
        </div>
        <button type="submit" class="btn-gold btn w-100" style="padding:14px;">Sign In</button>
      </form>

      <p class="text-center mt-4" style="color:var(--gray); font-size:0.85rem;">
        Don't have an account? <a href="register.html" style="color:var(--gold); font-weight:600;">Create one free</a>
      </p>
    </div>
  </div>
</section>
<!-- form JS -->
<script>
function togglePassword(id, btn) {
  var input = document.getElementById(id);
  var icon = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fas fa-eye';
  }
}
</script>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
