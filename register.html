<!-- container material start -->
<section class="auth-section">
  <div class="container">
    <div class="auth-card fade-up" style="max-width:560px;">
      <div class="auth-logo">VelvetWrap</div>
      <p class="auth-tagline">Create your free account & start gifting</p>

      <button class="social-auth-btn">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.3 30.2 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.8 6C12.4 13 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.4c-.5 2.8-2.1 5.1-4.4 6.7l7 5.4C43.2 37 46.1 31.2 46.1 24.5z"/><path fill="#FBBC05" d="M10.5 28.7c-.5-1.5-.8-3-.8-4.7s.3-3.2.8-4.7l-7.8-6C1 16.4 0 20.1 0 24s1 7.6 2.7 10.7l7.8-6z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7-5.4c-2 1.4-4.6 2.2-8.2 2.2-6.2 0-11.6-4.2-13.5-9.8l-7.8 6C6.6 42.6 14.6 48 24 48z"/></svg>
        Sign up with Google
      </button>

      <div class="divider-or">or register with email</div>

      <form id="registerForm">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label-velvet">First Name</label>
            <input type="text" id="firstName" class="form-control-velvet" placeholder="Your Name" required />
            <span class="error-msg"></span>
          </div>
          <div class="col-md-6">
            <label class="form-label-velvet">Last Name</label>
            <input type="text" id="lastName" class="form-control-velvet" placeholder="Your Last Name" required />
            <span class="error-msg"></span>
          </div>
          <div class="col-12">
            <label class="form-label-velvet">Email Address</label>
            <input type="email" id="email" class="form-control-velvet" placeholder="Your Email Addresss" required />
            <span class="error-msg"></span>
          </div>
          <div class="col-md-6">
            <label class="form-label-velvet">Phone Number</label>
            <input type="tel" id="phone" class="form-control-velvet" placeholder="+92 300 0000000" required/>
            <span class="error-msg"></span>
          </div>
          <div class="col-md-6">
            <label class="form-label-velvet">City</label>
            <select id="city" class="form-control-velvet" style="cursor:pointer;" required>
              <option value="">Select City</option>
              <option>Karachi</option>
              <option>Lahore</option>
              <option>Islamabad</option>
              <option>Rawalpindi</option>
              <option>Faisalabad</option>
              <option>Other</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label-velvet">Password</label>
            <div style="position:relative;">
              <input type="password" class="form-control-velvet" id="regPassword" placeholder="Min 8 characters" required style="padding-right:48px;" />
              
              <button type="button" onclick="togglePassword('regPassword', this)" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--gray); cursor:pointer;" class="eye-btn"><i class="fas fa-eye"></i></button>
            </div>
            <span class="error-msg"></span>
          </div>
          <div class="col-md-6">
            <label class="form-label-velvet">Confirm Password</label>
            <div style="position:relative;">
              <input type="password" class="form-control-velvet" id="regConfirm" placeholder="Repeat password" required style="padding-right:48px;" />
              <span class="error-msg"></span>
              <button type="button" onclick="togglePassword('regConfirm', this)" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--gray); cursor:pointer;"><i class="fas fa-eye"></i></button>
            </div>
          </div>
          <div class="col-12">
            <label style="display:flex; gap:10px; align-items:flex-start; cursor:pointer; color:rgba(255,255,255,0.6); font-size:0.82rem; line-height:1.6;">
              <input type="checkbox" id="terms" style="accent-color:var(--gold); margin-top:3px;" required />
              <span class="error-msg"></span>
              I agree to VelvetWrap's <a href="#" style="color:var(--gold);">Terms of Service</a>/<a href="#" style="color:var(--gold);">Privacy Policy</a>
            </label>
          </div>
          <div class="col-12 mt-2">
            <button type="submit" class="btn-gold btn w-100" style="padding:14px;">Create Account</button>
          </div>
        </div>
      </form>

      <p class="text-center mt-4" style="color:var(--gray); font-size:0.85rem;">
        Already have an account? <a href="signin.html" style="color:var(--gold); font-weight:600;">Sign In</a>
      </p>
    </div>
  </div>
</section>
